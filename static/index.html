<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GanXterm</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0d1117;
      --bg-panel:   #161b22;
      --bg-item:    #1c2330;
      --bg-hover:   #21293a;
      --accent:     #58a6ff;
      --accent2:    #3fb950;
      --danger:     #f85149;
      --warn:       #d29922;
      --border:     #30363d;
      --text:       #c9d1d9;
      --muted:      #8b949e;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 42px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      user-select: none;
    }
    .logo { color: var(--accent); font-weight: 700; font-size: 1rem; letter-spacing: 1px; }
    .logo span { color: var(--accent2); }
    .tagline { color: var(--muted); font-size: 0.75rem; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Session Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 180px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-hdr {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-hdr .label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    .btn-add {
      width: 26px; height: 26px;
      background: var(--accent);
      border: none; border-radius: 4px;
      color: var(--bg-deep);
      font-size: 1.1rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    .btn-add:hover { opacity: .85; }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-list::-webkit-scrollbar { width: 5px; }
    .session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .session-empty {
      padding: 20px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.7;
    }
    .session-card {
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px 8px;
      margin-bottom: 6px;
      transition: border-color .15s, background .15s;
    }
    .session-card:hover { border-color: var(--accent); background: var(--bg-hover); }
    .s-name { font-weight: 600; font-size: 0.88rem; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-host { font-size: 0.73rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-desc { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .s-actions { display: flex; gap: 5px; margin-top: 8px; }
    .btn-xs {
      padding: 3px 9px;
      border: none; border-radius: 3px;
      font-size: 0.72rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-xs:hover { opacity: .85; }
    .bx-connect { background: var(--accent);  color: var(--bg-deep); }
    .bx-edit    { background: var(--warn);    color: var(--bg-deep); }
    .bx-delete  { background: var(--danger);  color: #fff; }

    /* ── Terminal area ── */
    .terminal-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .tab-bar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      padding: 0 8px;
      gap: 3px;
      min-height: 36px;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
    }
    .tab-bar::-webkit-scrollbar { height: 3px; }
    .tab-bar::-webkit-scrollbar-thumb { background: var(--border); }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      user-select: none;
      transition: color .15s, background .15s;
    }
    .tab:hover { background: var(--bg-item); color: var(--text); }
    .tab.active { background: var(--bg-deep); border-color: var(--border); color: var(--accent); }
    .tab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
    .tab .dot.err { background: var(--danger); }
    .tab .tab-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
    .tab .sftp-tog {
      font-size: 0.68rem; font-weight: 700;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-item);
      color: var(--muted);
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: .5px;
    }
    .tab .sftp-tog:hover { color: var(--text); border-color: var(--accent); }
    .tab .sftp-tog.on { color: var(--accent2); border-color: var(--accent2); background: rgba(63,185,80,.1); }
    .tab .close {
      background: none; border: none; color: inherit;
      cursor: pointer; font-size: 1rem; line-height: 1;
      padding: 0; opacity: .4; transition: opacity .15s;
    }
    .tab .close:hover { opacity: 1; color: var(--danger); }

    /* ── Panes ── */
    .term-container { flex: 1; position: relative; overflow: hidden; }

    .welcome {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--muted); pointer-events: none;
    }
    .welcome h2 { font-size: 1.6rem; color: var(--accent); letter-spacing: 2px; }
    .welcome p  { font-size: 0.85rem; }

    /* Each connected tab's pane = horizontal split (SFTP | xterm) */
    .term-pane {
      position: absolute; inset: 0;
      display: none;
      flex-direction: row;
      overflow: hidden;
    }
    .term-pane.active { display: flex; }

    /* xterm wrapper — grows to fill remaining space */
    .xterm-wrapper { flex: 1; min-width: 0; padding: 4px; overflow: hidden; }

    /* ── SFTP Panel ── */
    .sftp-panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: none;          /* toggled via JS */
      flex-direction: column;
      overflow: hidden;
    }
    .sftp-panel.visible { display: flex; }

    .sftp-toolbar {
      padding: 5px 8px;
      background: var(--bg-item);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .sftp-path-lbl {
      flex: 1;
      font-size: 0.72rem;
      font-family: 'Cascadia Code','Fira Code','Courier New',monospace;
      color: var(--accent);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stb {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.72rem;
      padding: 3px 7px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color .15s, border-color .15s;
    }
    .stb:hover { color: var(--text); border-color: var(--accent); }

    .sftp-bc {
      padding: 4px 10px;
      font-size: 0.72rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      flex-shrink: 0;
      min-height: 24px;
      align-items: center;
    }
    .bc-seg { cursor: pointer; color: var(--accent); }
    .bc-seg:hover { text-decoration: underline; }
    .bc-sep { color: var(--muted); margin: 0 2px; }
    .bc-last { color: var(--muted); }

    /* ── SFTP file list ── */
    .sftp-files {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .sftp-files::-webkit-scrollbar { width: 5px; }
    .sftp-files::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sftp-files.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -4px;
      background: rgba(88,166,255,.05);
    }

    .sftp-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 3px;
      transition: background .1s;
      min-width: 0;
    }
    .sftp-row:hover { background: var(--bg-hover); }
    .sftp-row.dir { cursor: pointer; }
    .sftp-row.dir .sr-name { color: var(--accent); }
    .sr-icon { font-size: 0.82rem; flex-shrink: 0; }
    .sr-name {
      flex: 1;
      font-size: 0.78rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sr-size {
      font-size: 0.68rem;
      color: var(--muted);
      min-width: 44px;
      text-align: right;
      flex-shrink: 0;
    }
    .sr-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .sftp-row:hover .sr-actions { opacity: 1; }
    .sa {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
      transition: color .15s, background .15s;
    }
    .sa:hover { color: var(--text); background: var(--border); }
    .sa.sa-dl:hover  { color: var(--accent2); }
    .sa.sa-del:hover { color: var(--danger); }

    .sftp-msg {
      padding: 18px 12px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .sftp-msg.err { color: var(--danger); }

    /* Progress toast */
    .sftp-toast {
      position: fixed;
      bottom: 30px;
      right: 20px;
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--text);
      z-index: 500;
      display: none;
      gap: 10px;
      align-items: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .sftp-toast.show { display: flex; }
    .toast-spin { animation: spin .8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    .status-bar {
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      padding: 3px 14px;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }
    .s-ok   { color: var(--accent2); }
    .s-err  { color: var(--danger); }
    .s-info { color: var(--accent); }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px 28px 22px;
      width: 500px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .modal h2 { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 20px; letter-spacing: .5px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .fg { flex: 1; }
    .fg { margin-bottom: 13px; }
    .fg label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
    .fg input, .fg textarea {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 0.88rem;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }
    .fg input:focus, .fg textarea:focus { border-color: var(--accent); }
    .fg textarea { height: 90px; resize: vertical; font-family: 'Cascadia Code','Fira Code','Courier New',monospace; font-size: 0.8rem; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .auth-tab { padding: 5px 14px; font-size: 0.78rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none; }
    .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .btn { padding: 7px 20px; border: none; border-radius: 5px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: var(--accent); color: var(--bg-deep); }
    .btn-secondary { background: var(--bg-item); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo">Gan<span>X</span>term</div>
  <div class="tagline">Browser SSH Terminal</div>
</header>

<div class="layout">
  <!-- ── Session sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-hdr">
      <span class="label">Sessions</span>
      <button class="btn-add" id="btnAdd" title="New Session">+</button>
    </div>
    <div class="session-list" id="sessionList">
      <div class="session-empty">No sessions yet.<br/>Click <strong>+</strong> to add one.</div>
    </div>
  </aside>

  <!-- ── Terminal area ── -->
  <div class="terminal-area">
    <div class="tab-bar" id="tabBar"></div>
    <div class="term-container" id="termContainer">
      <div class="welcome" id="welcome">
        <h2>GanXterm</h2>
        <p>Select a session and click <strong>Connect</strong></p>
      </div>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"><span>Ready</span></div>

<!-- SFTP upload progress toast -->
<div class="sftp-toast" id="sftpToast">
  <span class="toast-spin">⟳</span>
  <span id="toastMsg">Uploading…</span>
</div>

<!-- ── Session Modal ── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">New Session</h2>

    <div class="fg">
      <label>Session Name *</label>
      <input id="fName" type="text" placeholder="My Server" autocomplete="off" />
    </div>

    <div class="form-row">
      <div class="fg" style="flex:3">
        <label>Host / IP *</label>
        <input id="fHost" type="text" placeholder="192.168.1.1 or hostname" autocomplete="off" />
      </div>
      <div class="fg" style="flex:1">
        <label>Port</label>
        <input id="fPort" type="number" value="22" min="1" max="65535" />
      </div>
    </div>

    <div class="fg">
      <label>Username *</label>
      <input id="fUser" type="text" placeholder="root" autocomplete="off" />
    </div>
    <div class="fg">
      <label>Description</label>
      <input id="fDesc" type="text" placeholder="Optional note" autocomplete="off" />
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="password">Password</div>
      <div class="auth-tab" data-tab="key">Private Key</div>
    </div>
    <div class="auth-panel active" id="panelPassword">
      <div class="fg">
        <label>Password</label>
        <input id="fPassword" type="password" placeholder="Leave blank if using a key" autocomplete="new-password" />
      </div>
    </div>
    <div class="auth-panel" id="panelKey">
      <div class="fg">
        <label>Private Key (PEM)</label>
        <textarea id="fKey" placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;…&#10;-----END RSA PRIVATE KEY-----"></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" id="btnCancel">Cancel</button>
      <button class="btn btn-primary"   id="btnSave">Save Session</button>
    </div>
  </div>
</div>

<!-- ============================================================ SCRIPT ===== -->
<script>
'use strict';

// ── Globals ───────────────────────────────────────────────────────────────────
let sessions = [];
let editingId = null;
let tabSeq = 0;
// tabs[tabId] = { sessionId, name, term, ws, fit, pane, tabEl, xtermWrapper,
//                 sftp: { visible, path } }
const tabs = {};

// ── Utilities ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function setStatus(msg, cls = '') {
  $('statusBar').innerHTML = `<span class="${esc(cls)}">${esc(msg)}</span>`;
}

function showToast(msg) {
  $('toastMsg').textContent = msg;
  $('sftpToast').classList.add('show');
}
function hideToast() { $('sftpToast').classList.remove('show'); }

function joinPath(base, name) {
  return (base.endsWith('/') ? base : base + '/') + name;
}
function parentPath(p) {
  const parts = p.replace(/\/$/, '').split('/');
  parts.pop();
  return parts.join('/') || '/';
}

function fmtSize(bytes) {
  if (!bytes) return '-';
  if (bytes < 1024)        return `${bytes}B`;
  if (bytes < 1048576)     return `${(bytes/1024).toFixed(1)}K`;
  if (bytes < 1073741824)  return `${(bytes/1048576).toFixed(1)}M`;
  return `${(bytes/1073741824).toFixed(1)}G`;
}

function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const m = {
    js:'📜',ts:'📜',jsx:'📜',tsx:'📜',py:'🐍',rb:'💎',go:'🐹',rs:'⚙',c:'⚙',cpp:'⚙',
    sh:'⚙',bash:'⚙',zsh:'⚙',fish:'⚙',
    html:'🌐',css:'🎨',json:'📋',xml:'📋',yaml:'📋',yml:'📋',toml:'📋',
    md:'📝',txt:'📝',log:'📋',conf:'⚙',cfg:'⚙',ini:'⚙',env:'⚙',
    jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',svg:'🖼',webp:'🖼',ico:'🖼',
    pdf:'📕',doc:'📘',docx:'📘',xls:'📗',xlsx:'📗',ppt:'📙',
    zip:'📦',tar:'📦',gz:'📦',bz2:'📦',xz:'📦',rar:'📦','7z':'📦',
    mp3:'🎵',wav:'🎵',flac:'🎵',mp4:'🎬',mkv:'🎬',avi:'🎬',mov:'🎬',
    db:'🗄',sqlite:'🗄',sql:'🗄',
  };
  return m[ext] || '📄';
}

// ── Session CRUD ─────────────────────────────────────────────────────────────
async function loadSessions() {
  const r = await fetch('/api/sessions');
  sessions = await r.json();
  renderSidebar();
}

function renderSidebar() {
  const list = $('sessionList');
  if (!sessions.length) {
    list.innerHTML = '<div class="session-empty">No sessions yet.<br/>Click <strong>+</strong> to add one.</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const card = document.createElement('div');
    card.className = 'session-card';
    card.innerHTML = `
      <div class="s-name" title="${esc(s.name)}">${esc(s.name)}</div>
      <div class="s-host">${esc(s.username)}@${esc(s.host)}:${s.port}</div>
      ${s.description ? `<div class="s-desc">${esc(s.description)}</div>` : ''}
      <div class="s-actions">
        <button class="btn-xs bx-connect" data-id="${s.id}" data-name="${esc(s.name)}">▶ Connect</button>
        <button class="btn-xs bx-edit"    data-id="${s.id}">Edit</button>
        <button class="btn-xs bx-delete"  data-id="${s.id}" data-name="${esc(s.name)}">Delete</button>
      </div>`;
    list.appendChild(card);
  });
}

$('sessionList').addEventListener('click', e => {
  const btn = e.target.closest('button[data-id]');
  if (!btn) return;
  const id = parseInt(btn.dataset.id);
  if (btn.classList.contains('bx-connect')) connectSession(id, btn.dataset.name);
  if (btn.classList.contains('bx-edit'))    openEditModal(id);
  if (btn.classList.contains('bx-delete'))  deleteSession(id, btn.dataset.name);
});

async function deleteSession(id, name) {
  if (!confirm(`Delete session "${name}"?`)) return;
  await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  loadSessions();
}

// ── Session Modal ─────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
  $('panelPassword').classList.toggle('active', tab === 'password');
  $('panelKey').classList.toggle('active', tab === 'key');
}
document.querySelectorAll('.auth-tab').forEach(el => el.addEventListener('click', () => switchAuthTab(el.dataset.tab)));

function closeModal() { $('overlay').classList.remove('show'); }
$('btnCancel').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

$('btnAdd').addEventListener('click', () => {
  editingId = null;
  ['fName','fHost','fUser','fPassword','fKey','fDesc'].forEach(id => { $(id).value = ''; });
  $('fPort').value = '22';
  switchAuthTab('password');
  $('modalTitle').textContent = 'New Session';
  $('overlay').classList.add('show');
  $('fName').focus();
});

async function openEditModal(id) {
  const r = await fetch(`/api/sessions/${id}`);
  if (!r.ok) return;
  const s = await r.json();
  editingId = id;
  $('fName').value = s.name; $('fHost').value = s.host; $('fPort').value = s.port;
  $('fUser').value = s.username; $('fPassword').value = s.password || '';
  $('fKey').value = s.private_key || ''; $('fDesc').value = s.description || '';
  switchAuthTab((s.private_key || '').trim() ? 'key' : 'password');
  $('modalTitle').textContent = 'Edit Session';
  $('overlay').classList.add('show');
}

$('btnSave').addEventListener('click', async () => {
  const payload = {
    name: $('fName').value.trim(), host: $('fHost').value.trim(),
    port: parseInt($('fPort').value) || 22, username: $('fUser').value.trim(),
    password: $('fPassword').value, private_key: $('fKey').value.trim(),
    description: $('fDesc').value.trim(),
  };
  if (!payload.name || !payload.host || !payload.username) {
    alert('Name, Host and Username are required.'); return;
  }
  const url    = editingId ? `/api/sessions/${editingId}` : '/api/sessions';
  const method = editingId ? 'PUT' : 'POST';
  const r = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if (!r.ok) { alert('Failed to save.'); return; }
  closeModal();
  loadSessions();
});

// ── Terminal connect ──────────────────────────────────────────────────────────
function connectSession(sessionId, sessionName) {
  const tabId = ++tabSeq;

  // Outer pane = flex row (SFTP panel | xterm wrapper)
  const pane = document.createElement('div');
  pane.className = 'term-pane';
  pane.id = `pane-${tabId}`;

  // SFTP panel (initially hidden)
  const sftpPanel = buildSftpPanel(tabId, sessionId);
  pane.appendChild(sftpPanel);

  // xterm wrapper
  const xtermWrapper = document.createElement('div');
  xtermWrapper.className = 'xterm-wrapper';
  xtermWrapper.id = `xterm-${tabId}`;
  pane.appendChild(xtermWrapper);

  $('termContainer').appendChild(pane);

  // Create xterm
  const term = new Terminal({
    theme: {
      background: '#0d1117', foreground: '#c9d1d9', cursor: '#58a6ff',
      selectionBackground: '#264f78',
      black:'#484f58', red:'#ff7b72', green:'#3fb950', yellow:'#d29922',
      blue:'#58a6ff', magenta:'#bc8cff', cyan:'#39c5cf', white:'#b1bac4',
      brightBlack:'#6e7681', brightRed:'#ffa198', brightGreen:'#56d364',
      brightYellow:'#e3b341', brightBlue:'#79c0ff', brightMagenta:'#d2a8ff',
      brightCyan:'#56d4dd', brightWhite:'#f0f6fc',
    },
    fontFamily: '"Cascadia Code","Fira Code","JetBrains Mono","Courier New",monospace',
    fontSize: 14, lineHeight: 1.2, cursorBlink: true, scrollback: 10000,
  });
  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(xtermWrapper);
  setTimeout(() => fit.fit(), 60);

  // Create tab
  const tabEl = document.createElement('div');
  tabEl.className = 'tab';
  tabEl.id = `tab-${tabId}`;
  tabEl.innerHTML = `
    <span class="dot" id="dot-${tabId}"></span>
    <span class="tab-name">${esc(sessionName)}</span>
    <button class="sftp-tog" id="stog-${tabId}" title="Toggle SFTP panel">SFTP</button>
    <button class="close" title="Close">×</button>`;
  tabEl.querySelector('.sftp-tog').addEventListener('click', e => {
    e.stopPropagation();
    toggleSftp(tabId);
  });
  tabEl.querySelector('.close').addEventListener('click', e => {
    e.stopPropagation();
    closeTab(tabId);
  });
  tabEl.addEventListener('click', () => activateTab(tabId));
  $('tabBar').appendChild(tabEl);

  tabs[tabId] = {
    sessionId, name: sessionName,
    term, ws: null, fit, pane, tabEl, xtermWrapper,
    sftp: { visible: false, path: '/' },
  };

  activateTab(tabId);

  // Resize observer on xtermWrapper (detects SFTP panel toggle + window resize)
  const ro = new ResizeObserver(() => {
    if (tabs[tabId]) { fit.fit(); sendResize(tabId); }
  });
  ro.observe(xtermWrapper);
  tabs[tabId].ro = ro;

  // WebSocket
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/ws/terminal/${sessionId}`);
  tabs[tabId].ws = ws;

  term.writeln(`\x1b[36mConnecting to \x1b[1m${sessionName}\x1b[22m…\x1b[0m`);

  ws.onmessage = ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    if (msg.type === 'output') {
      term.write(msg.data);
    } else if (msg.type === 'connected') {
      setStatus(`Connected to ${sessionName}`, 's-ok');
      setDot(tabId, 'ok');
      sendResize(tabId);
    } else if (msg.type === 'disconnected') {
      term.writeln('\r\n\x1b[33mSession ended.\x1b[0m');
      setStatus('Disconnected'); setDot(tabId, 'err');
    } else if (msg.type === 'error') {
      term.writeln(`\r\n\x1b[31mError: ${msg.data}\x1b[0m`);
      setStatus(`Error — ${msg.data}`, 's-err'); setDot(tabId, 'err');
    }
  };
  ws.onerror = () => { term.writeln('\r\n\x1b[31mWebSocket error.\x1b[0m'); setDot(tabId, 'err'); };
  ws.onclose = () => { if (tabs[tabId]) { term.writeln('\r\n\x1b[90mConnection closed.\x1b[0m'); setDot(tabId, 'err'); } };

  term.onData(data => { if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data })); });
}

function sendResize(tabId) {
  const t = tabs[tabId];
  if (!t || !t.ws || t.ws.readyState !== WebSocket.OPEN) return;
  t.ws.send(JSON.stringify({ type: 'resize', cols: t.term.cols, rows: t.term.rows }));
}

function setDot(tabId, state) {
  const d = $(`dot-${tabId}`);
  if (d) d.className = `dot${state === 'err' ? ' err' : ''}`;
}

function activateTab(tabId) {
  Object.values(tabs).forEach(t => {
    t.tabEl.classList.remove('active');
    t.pane.classList.remove('active');
  });
  const t = tabs[tabId];
  if (!t) return;
  t.tabEl.classList.add('active');
  t.pane.classList.add('active');
  $('welcome').style.display = 'none';
  setTimeout(() => t.fit.fit(), 30);
  setStatus(`Connected to ${t.name}`, 's-info');
}

function closeTab(tabId) {
  const t = tabs[tabId];
  if (!t) return;
  if (t.ws) t.ws.close();
  if (t.ro) t.ro.disconnect();
  t.term.dispose();
  t.tabEl.remove();
  t.pane.remove();
  delete tabs[tabId];
  const ids = Object.keys(tabs);
  if (ids.length) {
    activateTab(parseInt(ids[ids.length - 1]));
  } else {
    $('welcome').style.display = '';
    setStatus('Ready');
  }
}

// ── SFTP Panel builder ────────────────────────────────────────────────────────
function buildSftpPanel(tabId, sessionId) {
  const panel = document.createElement('div');
  panel.className = 'sftp-panel';
  panel.id = `sftp-panel-${tabId}`;

  panel.innerHTML = `
    <div class="sftp-toolbar">
      <span class="sftp-path-lbl" id="sftp-path-${tabId}">/</span>
      <button class="stb" id="sftp-up-btn-${tabId}" title="Upload files (or drag & drop)">⬆ Upload</button>
      <button class="stb" title="New folder" id="sftp-mkdir-btn-${tabId}">📁+</button>
      <button class="stb" title="Refresh" id="sftp-ref-btn-${tabId}">⟳</button>
      <input type="file" id="sftp-input-${tabId}" style="display:none" multiple />
    </div>
    <div class="sftp-bc" id="sftp-bc-${tabId}"></div>
    <div class="sftp-files" id="sftp-files-${tabId}">
      <div class="sftp-msg">Toggle SFTP to load the remote filesystem</div>
    </div>`;

  // Toolbar button wiring
  panel.querySelector(`#sftp-ref-btn-${tabId}`).addEventListener('click', () => sftpLoad(tabId));
  panel.querySelector(`#sftp-mkdir-btn-${tabId}`).addEventListener('click', () => sftpMkdirPrompt(tabId));
  panel.querySelector(`#sftp-up-btn-${tabId}`).addEventListener('click', () => panel.querySelector(`#sftp-input-${tabId}`).click());
  panel.querySelector(`#sftp-input-${tabId}`).addEventListener('change', function () {
    sftpUploadFiles(tabId, Array.from(this.files));
    this.value = '';
  });

  // Breadcrumb click delegation
  panel.querySelector(`#sftp-bc-${tabId}`).addEventListener('click', e => {
    const seg = e.target.closest('[data-path]');
    if (seg) sftpNavigate(tabId, seg.dataset.path);
  });

  // File list click delegation
  const fileList = panel.querySelector(`#sftp-files-${tabId}`);
  fileList.addEventListener('click', e => {
    const btn = e.target.closest('.sa[data-action]');
    if (btn) {
      e.stopPropagation();
      const { action, path, isdir } = btn.dataset;
      if (action === 'download') sftpDownload(tabId, path);
      if (action === 'rename')   sftpRenamePrompt(tabId, path);
      if (action === 'delete')   sftpDelete(tabId, path, isdir === 'true');
      return;
    }
    const row = e.target.closest('.sftp-row.dir[data-path]');
    if (row) sftpNavigate(tabId, row.dataset.path);
  });

  // Drag-and-drop upload
  fileList.addEventListener('dragover', e => { e.preventDefault(); fileList.classList.add('drag-over'); });
  fileList.addEventListener('dragleave', () => fileList.classList.remove('drag-over'));
  fileList.addEventListener('drop', e => {
    e.preventDefault();
    fileList.classList.remove('drag-over');
    const files = Array.from(e.dataTransfer.files);
    if (files.length) sftpUploadFiles(tabId, files);
  });

  return panel;
}

// ── SFTP toggle ───────────────────────────────────────────────────────────────
function toggleSftp(tabId) {
  const t = tabs[tabId];
  if (!t) return;
  t.sftp.visible = !t.sftp.visible;
  const panel = $(`sftp-panel-${tabId}`);
  const togBtn = $(`stog-${tabId}`);
  panel.classList.toggle('visible', t.sftp.visible);
  togBtn.classList.toggle('on', t.sftp.visible);
  if (t.sftp.visible) sftpLoad(tabId);
  // Terminal will auto-resize via ResizeObserver on xtermWrapper
}

// ── SFTP operations ───────────────────────────────────────────────────────────
async function sftpLoad(tabId) {
  const t = tabs[tabId];
  if (!t) return;
  const filesEl = $(`sftp-files-${tabId}`);
  filesEl.innerHTML = '<div class="sftp-msg">Loading…</div>';

  try {
    const r = await fetch(`/api/sftp/${t.sessionId}/ls?path=${encodeURIComponent(t.sftp.path)}`);
    if (!r.ok) {
      const err = await r.json();
      filesEl.innerHTML = `<div class="sftp-msg err">Error: ${esc(err.detail)}</div>`;
      return;
    }
    const { path, entries } = await r.json();
    t.sftp.path = path;   // server normalised it
    renderBreadcrumbs(tabId);
    renderFiles(tabId, entries);
  } catch (e) {
    filesEl.innerHTML = `<div class="sftp-msg err">Network error: ${esc(e.message)}</div>`;
  }
}

function sftpNavigate(tabId, path) {
  if (!tabs[tabId]) return;
  tabs[tabId].sftp.path = path;
  sftpLoad(tabId);
}

async function sftpMkdirPrompt(tabId) {
  const name = prompt('New folder name:');
  if (!name) return;
  const t = tabs[tabId];
  const path = joinPath(t.sftp.path, name);
  const r = await fetch(`/api/sftp/${t.sessionId}/mkdir`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ path }),
  });
  if (!r.ok) { const e = await r.json(); alert(`Failed: ${e.detail}`); return; }
  sftpLoad(tabId);
}

async function sftpRenamePrompt(tabId, oldPath) {
  const oldName = oldPath.split('/').pop();
  const newName = prompt('Rename to:', oldName);
  if (!newName || newName === oldName) return;
  const t = tabs[tabId];
  const newPath = joinPath(parentPath(oldPath), newName);
  const r = await fetch(`/api/sftp/${t.sessionId}/rename`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ old_path: oldPath, new_path: newPath }),
  });
  if (!r.ok) { const e = await r.json(); alert(`Failed: ${e.detail}`); return; }
  sftpLoad(tabId);
}

async function sftpDelete(tabId, path, isDir) {
  const name = path.split('/').pop();
  const msg = isDir
    ? `Delete folder "${name}" and all its contents?`
    : `Delete file "${name}"?`;
  if (!confirm(msg)) return;
  const t = tabs[tabId];
  const r = await fetch(`/api/sftp/${t.sessionId}/delete?path=${encodeURIComponent(path)}`, { method: 'DELETE' });
  if (!r.ok) { const e = await r.json(); alert(`Failed: ${e.detail}`); return; }
  sftpLoad(tabId);
}

function sftpDownload(tabId, path) {
  const t = tabs[tabId];
  const a = document.createElement('a');
  a.href = `/api/sftp/${t.sessionId}/download?path=${encodeURIComponent(path)}`;
  a.download = path.split('/').pop();
  a.click();
}

async function sftpUploadFiles(tabId, files) {
  const t = tabs[tabId];
  for (const file of files) {
    showToast(`Uploading ${file.name}…`);
    const fd = new FormData();
    fd.append('path', t.sftp.path);
    fd.append('file', file);
    const r = await fetch(`/api/sftp/${t.sessionId}/upload`, { method: 'POST', body: fd });
    if (!r.ok) {
      hideToast();
      const e = await r.json();
      alert(`Upload failed for "${file.name}": ${e.detail}`);
      return;
    }
  }
  hideToast();
  setStatus(`Uploaded ${files.length} file(s)`, 's-ok');
  sftpLoad(tabId);
}

// ── SFTP render helpers ───────────────────────────────────────────────────────
function renderBreadcrumbs(tabId) {
  const t = tabs[tabId];
  $(`sftp-path-${tabId}`).textContent = t.sftp.path;

  const parts = t.sftp.path.split('/').filter(Boolean);
  let html = `<span class="bc-seg" data-path="/">/</span>`;
  let cum = '';
  parts.forEach((p, i) => {
    cum += '/' + p;
    const isLast = i === parts.length - 1;
    html += isLast
      ? `<span class="bc-sep">/</span><span class="bc-last">${esc(p)}</span>`
      : `<span class="bc-sep">/</span><span class="bc-seg" data-path="${esc(cum)}">${esc(p)}</span>`;
  });
  $(`sftp-bc-${tabId}`).innerHTML = html;
}

function renderFiles(tabId, entries) {
  const t = tabs[tabId];
  const container = $(`sftp-files-${tabId}`);

  if (!entries.length && t.sftp.path === '/') {
    container.innerHTML = '<div class="sftp-msg">Empty directory</div>';
    return;
  }

  let html = '';

  // Parent dir ".." row
  if (t.sftp.path !== '/') {
    const pp = JSON.stringify(parentPath(t.sftp.path));
    html += `
      <div class="sftp-row dir" data-path=${pp}>
        <span class="sr-icon">📁</span>
        <span class="sr-name" style="color:var(--muted)">..</span>
        <span class="sr-size"></span>
        <div class="sr-actions"></div>
      </div>`;
  }

  for (const e of entries) {
    const isDir  = e.type === 'dir';
    const icon   = isDir ? '📁' : fileIcon(e.name);
    const size   = isDir ? '' : fmtSize(e.size);
    const fp     = JSON.stringify(joinPath(t.sftp.path, e.name));
    const isdirJ = JSON.stringify(isDir);

    const dlBtn = isDir ? '' :
      `<button class="sa sa-dl" data-action="download" data-path=${fp} title="Download">⬇</button>`;

    html += `
      <div class="sftp-row ${isDir ? 'dir' : 'file'}" data-path=${fp}>
        <span class="sr-icon">${icon}</span>
        <span class="sr-name" title=${JSON.stringify(e.name)}>${esc(e.name)}</span>
        <span class="sr-size">${size}</span>
        <div class="sr-actions">
          ${dlBtn}
          <button class="sa" data-action="rename" data-path=${fp} data-isdir=${isdirJ} title="Rename">✏</button>
          <button class="sa sa-del" data-action="delete" data-path=${fp} data-isdir=${isdirJ} title="Delete">🗑</button>
        </div>
      </div>`;
  }

  container.innerHTML = html || '<div class="sftp-msg">Empty directory</div>';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadSessions();
</script>
</body>
